[table_info]
target_table = ads_user_age_category1_stat_day
comment = 用户年龄段及一级品类购买力日汇总表

[columns]
# 目标字段 = 数据类型 | 字段注释 | 转换逻辑
category1_id = BIGINT | 一级品类ID(主键) | dws_sale_detail_daycount.sku_category1_id
category1_name = STRING | 一级品类名称 | dws_sale_detail_daycount.sku_category1_name
age_group = STRING | 年龄段(主键) | dim_age_range.age_group (关联年龄维表获取)
order_num = BIGINT | 当日订单数 | SUM(order_count)
order_amount_all = DECIMAL(16,2) | 当日订单总金额 | SUM(order_amount)
order_amount_avg = DECIMAL(16,2) | 当日平均单价 | SUM(order_amount) / SUM(order_count)
stat_day = STRING | 汇总日期 | do_date
etl_time = TIMESTAMP | ETL处理时间 | current_timestamp()