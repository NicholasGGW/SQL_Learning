# ==========================================
# 表名: user_info (商城用户表)
# ==========================================

# 1. 源端信息 (MySQL)
SRC_TABLE=user_info
# 如果某些表需要特殊的查询条件，可以在这里定义，否则默认为空
SRC_WHERE_CLAUSE=status=1

# 2. 目标端信息 (Hive)
TGT_DB=ods_mall_db
TGT_TABLE=ods_user_info
# 分区字段 (如果有)
PARTITION_COL=dt

# 3. 字段映射与类型 (用于生成建表语句或校验)
# 格式: 字段名|Hive数据类型|注释
FIELDS=(
    "user_id|BIGINT|用户唯一ID"
    "user_name|STRING|用户姓名"
    "age|INT|年龄"
    "create_time|TIMESTAMP|创建时间"
)

# ==========================================
# 表名: user_info (用户信息表)
# 描述: 商城核心用户基础画像
# 负责人: DataTeam
# ==========================================

# --- 上游配置 (MySQL) ---
# 对应的数据库名
UP_DB_NAME=mall_db
# 对应的表名
UP_TABLE_NAME=user_info
# 主键/分区字段 (用于增量抽取或去重)
UP_PRIMARY_KEY=id
# 更新时间字段 (用于增量同步判断)
UP_UPDATE_TIME=update_time

# --- 下游配置 (Hive ODS) ---
# 目标库名
ODS_DB_NAME=ods_mall_db
# 目标表名
ODS_TABLE_NAME=ods_user_info_di
# 存储格式 (ORC/PARQUET/TEXTFILE)
STORE_FORMAT=ORC
# 压缩方式 (SNAPPY/GZIP/NONE)
COMPRESS_TYPE=SNAPPY

# --- 抽取策略 ---
# 全量(FULL) 或 增量(INCREMENTAL)
SYNC_TYPE=INCREMENTAL
# 自定义过滤条件 (可选，留空则不限制)
WHERE_CONDITION=status = 'active'