[table_info]
target_table = dim_sku_info
comment = 商品维度宽表（已集成一二三级类目明细，进行维度退化）

[columns]
# 目标DWD字段 = 数据类型 | 字段注释 | 来源ODS映射或转换逻辑
sku_id = BIGINT | SKU商品编号,库存ID(主键) | ods_sku_info.id
spu_id = BIGINT | SPU商品编号 | ods_sku_info.spu_id
price = DECIMAL(16,2) | 商品价格(高精度转换) | CAST(ods_sku_info.price AS DECIMAL(16,2))
sku_name = STRING | SKU商品名称 | ods_sku_info.sku_name
sku_desc = STRING | 商品规格描述 | ods_sku_info.sku_desc
weight = DECIMAL(16,2) | 商品重量 | CAST(ods_sku_info.weight AS DECIMAL(16,2))
tm_id = BIGINT | 品牌ID | ods_sku_info.tm_id
category3_id = BIGINT | 三级分类ID | ods_sku_info.category3_id
sku_default_img = STRING | 默认显示图片 | ods_sku_info.sku_default_img
create_time = TIMESTAMP | 创建时间 | ods_sku_info.create_time
category3_name = STRING | 三级分类名称 | ods_base_category3.name
category2_id = BIGINT | 二级分类ID | ods_base_category3.category2_id
category2_name = STRING | 二级分类名称 | ods_base_category2.name
category1_id = BIGINT | 一级分类ID | ods_base_category2.category1_id
category1_name = STRING | 一级分类名称 | ods_base_category1.name
etl_time = TIMESTAMP | ETL处理时间 | current_timestamp()

