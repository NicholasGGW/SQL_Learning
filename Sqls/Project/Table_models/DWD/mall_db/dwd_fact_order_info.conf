[table_info]
target_table = dwd_fact_order_info
comment = 订单事实表（事务型事实表，订单主表）

[columns]
# 目标DWD字段 = 数据类型 | 字段注释 | 来源ODS映射或转换逻辑
id = BIGINT | 订单主表编号 | ods_order_info.id
consignee = STRING | 收货人 | ods_order_info.consignee
consignee_tel = STRING | 收件人电话 | ods_order_info.consignee_tel
total_amount = DECIMAL(16,2) | 总金额 | CAST(ods_order_info.total_amount AS DECIMAL(16,2))
order_status = STRING | 订单状态 | ods_order_info.order_status
user_id = BIGINT | 下单用户编号 | ods_order_info.user_id
payment_way = STRING | 付款方式 | ods_order_info.payment_way
delivery_address = STRING | 送货地址 | ods_order_info.delivery_address
order_comment = STRING | 订单备注 | ods_order_info.order_comment
out_trade_no = STRING | 订单交易编号 | ods_order_info.out_trade_no
trade_body = STRING | 订单描述 | ods_order_info.trade_body
create_time = TIMESTAMP | 订单创建时间 | ods_order_info.create_time
operate_time = TIMESTAMP | 订单操作时间 | ods_order_info.operate_time
expire_time = TIMESTAMP | 订单失效时间 | ods_order_info.expire_time
tracking_no = STRING | 物流单编号 | ods_order_info.tracking_no
parent_order_id = BIGINT | 父订单编号 | ods_order_info.parent_order_id
img_url = STRING | 图片路径 | ods_order_info.img_url
etl_time = TIMESTAMP | ETL处理时间 | current_timestamp()