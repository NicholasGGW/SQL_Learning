[table_info]
target_table = dwd_fact_order_detail
comment = 订单明细事实表（事务型事实表，集成明细与主表部分状态）

[columns]
# 目标DWD字段 = 数据类型 | 字段注释 | 来源ODS映射或转换逻辑
id = BIGINT | 订单明细条目编号(主键) | ods_order_detail.id
order_id = BIGINT | 订单主表编号 | ods_order_detail.order_id
user_id = BIGINT | 下单用户编号(退化维度) | ods_order_info.user_id
sku_id = BIGINT | 商品SKU编号 | ods_order_detail.sku_id
sku_name = STRING | 商品名称 | ods_order_detail.sku_name
order_price = DECIMAL(16,2) | 下单时SKU单价 | CAST(ods_order_detail.order_price AS DECIMAL(16,2))
sku_num = BIGINT | 购买数量(类型规范化) | CAST(ods_order_detail.sku_num AS BIGINT)
order_status = STRING | 当前订单状态(退化维度) | ods_order_info.order_status
create_time = TIMESTAMP | 订单创建时间 | ods_order_info.create_time
