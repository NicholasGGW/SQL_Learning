[table_info]
target_table = dwd_fact_payment_info
comment = 支付流水事实表（事务型事实表，对业务ID进行标准转型）

[columns]
# 目标DWD字段 = 数据类型 | 字段注释 | 来源ODS映射或转换逻辑
id = BIGINT | 支付流水编号(主键) | ods_payment_info.id
out_trade_no = STRING | 对外业务三方交易号 | ods_payment_info.out_trade_no
order_id = BIGINT | 对应订单主表编号 | CAST(ods_payment_info.order_id AS BIGINT)
user_id = BIGINT | 支付用户编号 | CAST(ods_payment_info.user_id AS BIGINT)
alipay_trade_no = STRING | 支付宝交易流水号 | ods_payment_info.alipay_trade_no
total_amount = DECIMAL(16,2) | 实际支付金额 | CAST(ods_payment_info.total_amount AS DECIMAL(16,2))
subject = STRING | 交易主题内容 | ods_payment_info.subject
payment_type = STRING | 支付渠道类型 | ods_payment_info.payment_type
payment_time = STRING | 支付完成时间 | ods_payment_info.payment_time
